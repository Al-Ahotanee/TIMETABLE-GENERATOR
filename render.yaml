services:
  - type: web
    name: timetable-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

  - type: static
    name: timetable-frontend
    plan: free
    buildCommand: echo "Static site – no build required"
    staticPublishPath: ./
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

databases:
  - name: timetable-db
    plan: free
    postgresMajorVersion: 15
